name: Deploy Worker API

on:
  pull_request:
    paths:
      - "cloudflare/worker/**"
      - ".github/workflows/deploy-worker.yml"
  push:
    branches: ["main"]
    paths:
      - "cloudflare/worker/**"
      - ".github/workflows/deploy-worker.yml"

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: cloudflare/worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Apply preview migrations
        run: npx wrangler d1 migrations apply MOLBHAV_DB --env preview --remote

      - name: Seed preview catalog
        run: npx wrangler d1 execute MOLBHAV_DB --env preview --remote --file ./seeds/seed_products.sql

      - name: Deploy preview worker
        run: npx wrangler deploy --env preview

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: cloudflare/worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Apply production migrations
        run: npx wrangler d1 migrations apply MOLBHAV_DB --env production --remote

      - name: Seed production catalog
        run: npx wrangler d1 execute MOLBHAV_DB --env production --remote --file ./seeds/seed_products.sql

      - name: Deploy production worker
        run: npx wrangler deploy --env production

