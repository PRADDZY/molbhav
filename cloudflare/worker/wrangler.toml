name = "molbhav-api"
main = "src/index.ts"
compatibility_date = "2026-05-30"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "molbhav-preview"
database_id = "REPLACE_WITH_PREVIEW_D1_DB_ID"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_PREVIEW_RATE_LIMIT_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_RATE_LIMIT_KV_ID"

[[kv_namespaces]]
binding = "COOLDOWN_KV"
id = "REPLACE_WITH_PREVIEW_COOLDOWN_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_COOLDOWN_KV_ID"

[durable_objects]
bindings = [
  { name = "SESSION_LOCK", class_name = "SessionLockDurableObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionLockDurableObject"]

[vars]
APP_ENV = "preview"
CORS_ALLOWED_ORIGINS = "[\"http://localhost:5173\"]"
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
OPENROUTER_MODEL = "openrouter/free"
DEFAULT_BETA = "5.0"
DEFAULT_ALPHA = "0.6"
DEFAULT_MAX_ROUNDS = "10"
DEFAULT_SESSION_TTL_SECONDS = "300"
MIN_RESPONSE_DELAY_MS = "2000"
MAX_REQUESTS_PER_MINUTE_PER_IP = "30"

[env.preview]

[[env.preview.d1_databases]]
binding = "DB"
database_name = "molbhav-preview"
database_id = "REPLACE_WITH_PREVIEW_D1_DB_ID"
migrations_dir = "migrations"

[[env.preview.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_PREVIEW_RATE_LIMIT_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_RATE_LIMIT_KV_ID"

[[env.preview.kv_namespaces]]
binding = "COOLDOWN_KV"
id = "REPLACE_WITH_PREVIEW_COOLDOWN_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_COOLDOWN_KV_ID"

[env.preview.durable_objects]
bindings = [
  { name = "SESSION_LOCK", class_name = "SessionLockDurableObject" }
]

[env.preview.vars]
APP_ENV = "preview"
CORS_ALLOWED_ORIGINS = "[\"https://REPLACE_WITH_PREVIEW_PAGES_DOMAIN\"]"

[env.production]

[[env.production.d1_databases]]
binding = "DB"
database_name = "molbhav-production"
database_id = "REPLACE_WITH_PRODUCTION_D1_DB_ID"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_PRODUCTION_RATE_LIMIT_KV_ID"

[[env.production.kv_namespaces]]
binding = "COOLDOWN_KV"
id = "REPLACE_WITH_PRODUCTION_COOLDOWN_KV_ID"

[env.production.durable_objects]
bindings = [
  { name = "SESSION_LOCK", class_name = "SessionLockDurableObject" }
]

[env.production.vars]
APP_ENV = "production"
CORS_ALLOWED_ORIGINS = "[\"https://REPLACE_WITH_PRODUCTION_PAGES_DOMAIN\"]"
