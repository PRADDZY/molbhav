name = "molbhav-api"
main = "src/index.ts"
compatibility_date = "2026-05-30"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "molbhav-preview"
database_id = "10e34851-71d2-418b-92ae-3734129d046c"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "47e3622ffd8b4e99bcbc0a8c1e60f1a8"
preview_id = "47e3622ffd8b4e99bcbc0a8c1e60f1a8"

[[kv_namespaces]]
binding = "COOLDOWN_KV"
id = "b00a962181614d81ba0cfb3a9f80c5a3"
preview_id = "b00a962181614d81ba0cfb3a9f80c5a3"

[durable_objects]
bindings = [
  { name = "SESSION_LOCK", class_name = "SessionLockDurableObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionLockDurableObject"]

[vars]
APP_ENV = "preview"
CORS_ALLOWED_ORIGINS = "[\"http://localhost:5173\"]"
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
OPENROUTER_MODEL = "openrouter/free"
DEFAULT_BETA = "5.0"
DEFAULT_ALPHA = "0.6"
DEFAULT_MAX_ROUNDS = "10"
DEFAULT_SESSION_TTL_SECONDS = "300"
MIN_RESPONSE_DELAY_MS = "2000"
MAX_REQUESTS_PER_MINUTE_PER_IP = "30"

